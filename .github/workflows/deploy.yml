name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy na VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Instalar pnpm
        uses: pnpm/action-setup@v5

      - name: Instalar Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Instalar dependências
        run: pnpm install
        #run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASS }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            # Instala/atualiza yt-dlp
            curl -sSL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /tmp/yt-dlp
            chmod a+rx /tmp/yt-dlp
            sudo mv /tmp/yt-dlp /usr/local/bin/yt-dlp
            mkdir -p ~/.ssh && ssh-keyscan github.com >> ~/.ssh/known_hosts
            mkdir -p ${{ secrets.PROJECT_PATH }} 2>/dev/null || true
            cd ${{ secrets.PROJECT_PATH }}
            git pull origin main
            git clean -fxd -e .env
            cp .env .env.example
            pnpm install --frozen-lockfile
            pnpm build
            sudo /usr/bin/systemctl restart gigi
            
